services:
  postgres:
    image: postgres:16
    container_name: scbs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scbs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scbs"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - scbs-postgres-data:/var/lib/postgresql/data

volumes:
  scbs-postgres-data:
